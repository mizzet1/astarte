name: Publish to Hex.pm

on:
  release:
    types: [published]

jobs:
  publish-hex:
    name: Publish ${{ matrix.package }} to Hex.pm
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: astarte_data_access
            path: libs/astarte_data_access
          - package: astarte_events
            path: libs/astarte_events
          - package: astarte_fdo
            path: libs/astarte_fdo
          - package: astarte_fdo_core
            path: libs/astarte_fdo_core
          - package: astarte_generators
            path: libs/astarte_generators
          - package: astarte_rpc
            path: libs/astarte_rpc
          - package: astarte_secrets
            path: libs/astarte_secrets
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: mix deps.get

      - name: Publish to Hex.pm
        working-directory: ${{ matrix.path }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
